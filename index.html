<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 4 Years, Zaiyu 💕</title>

<!-- ════════════════════════════════════════════════════════════════════
     💗  EDIT ME:  everything personal (names, date, message, reasons,
     love note) lives in the <script id="config"> block near the bottom.
     Photos & the College Nine scene are already baked in. Upload this one
     file to GitHub and you're done.
════════════════════════════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Caveat:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --blush:#FFF0F5;--cotton:#FFE4EF;--bubblegum:#FFC8DF;--rose:#FF8FB8;
    --berry:#D6608F;--ink:#6A4152;--cream:#FFFDFB;--peri:#CBB6FF;--sky:#EDEAFF;
    --shadow:0 18px 40px -18px rgba(214,96,143,.45);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;font-family:'Nunito',sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#EDEAFF 0%, #FBE7F1 12%, var(--blush) 26%, var(--cotton) 100%);
    background-attachment:fixed;overflow-x:hidden;line-height:1.6;
  }
  h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;margin:0;color:var(--berry)}

  #hearts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .h-float{position:absolute;bottom:-40px;font-size:22px;opacity:0;animation:rise linear infinite;filter:drop-shadow(0 2px 2px rgba(214,96,143,.25))}
  @keyframes rise{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:.85}90%{opacity:.85}100%{transform:translateY(-112vh) rotate(40deg);opacity:0}}

  .wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 22px}

  /* ── HERO with campus scene ── */
  .hero{position:relative;min-height:92vh;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 20px 46px;overflow:hidden}
  .scene{position:absolute;inset:0;z-index:0;pointer-events:none}
  .scene svg{width:100%;height:100%;display:block}
  .hero-inner{position:relative;z-index:1;width:100%;max-width:880px;padding-top:5.5vh}
  .eyebrow{font-family:'Caveat',cursive;font-size:clamp(30px,6vw,46px);color:var(--berry);line-height:1;transform:rotate(-3deg);display:inline-block;text-shadow:0 2px 8px rgba(255,255,255,.85)}
  .hero h1{font-size:clamp(48px,11vw,102px);line-height:.98;letter-spacing:-1px;margin:.05em 0 .12em;color:var(--berry);text-shadow:0 3px 0 #fff,0 6px 18px rgba(214,96,143,.28)}
  .names{font-family:'Fredoka';font-weight:500;font-size:clamp(18px,4.2vw,26px);color:var(--ink);text-shadow:0 2px 8px rgba(255,255,255,.8)}
  .names b{color:var(--rose)}
  .where{font-family:'Caveat';font-size:clamp(18px,3.8vw,24px);color:var(--berry);opacity:.9;margin:2px 0 0;text-shadow:0 2px 8px rgba(255,255,255,.8)}

  .trio{display:flex;justify-content:center;align-items:flex-end;gap:clamp(4px,1.4vw,16px);margin:22px auto 0;flex-wrap:nowrap}
  .ph{background:#fff;padding:9px 9px 8px;border-radius:16px;box-shadow:0 18px 32px -14px rgba(214,96,143,.6);width:clamp(94px,25vw,208px)}
  .ph img{display:block;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:10px;background:#f6e3ee}
  .ph figcaption{font-family:'Caveat';font-weight:700;font-size:clamp(15px,3.6vw,22px);color:var(--berry);margin-top:3px;line-height:1.1}
  .ph-l{transform:rotate(-6deg)}
  .ph-r{transform:rotate(6deg)}
  .ph-c{width:clamp(116px,29vw,244px);transform:translateY(-8px) rotate(-1.5deg);z-index:2}
  .ph-c img{aspect-ratio:4/5}

  .message{max-width:640px;margin:26px auto 4px;font-family:'Fredoka';font-weight:500;font-size:clamp(18px,3.5vw,25px);color:var(--berry);line-height:1.36;text-shadow:0 2px 12px rgba(255,255,255,.9)}
  .message .big{font-weight:600;color:var(--rose)}
  .scrolldown{display:inline-flex;flex-direction:column;align-items:center;gap:0;margin-top:14px;font-family:'Caveat';font-size:22px;color:var(--rose);text-decoration:none;animation:bounce 1.9s ease-in-out infinite;text-shadow:0 2px 8px rgba(255,255,255,.9)}
  .scrolldown .chev{font-size:30px;line-height:.7;margin-top:-2px}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

  /* ── counter ── */
  .counter{margin:-10px auto 12px;max-width:640px;background:var(--cream);border:3px solid #fff;border-radius:28px;box-shadow:var(--shadow);padding:26px 22px;text-align:center;position:relative;z-index:2}
  .counter .label{font-family:'Caveat';font-size:26px;color:var(--berry)}
  .counter-grid{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px}
  .unit{background:linear-gradient(160deg,var(--cotton),#fff);border-radius:18px;padding:12px 6px;min-width:78px;flex:1 1 78px;max-width:120px;border:2px solid #fff;box-shadow:0 6px 14px -8px rgba(214,96,143,.4)}
  .unit .num{font-family:'Fredoka';font-weight:700;font-size:clamp(24px,6vw,34px);color:var(--rose);line-height:1}
  .unit .u{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);opacity:.65;font-weight:700}

  .section{padding:40px 0}
  .section-title{text-align:center;font-size:clamp(28px,6.5vw,44px);margin-bottom:6px}
  .section-sub{text-align:center;font-family:'Caveat';font-size:24px;color:var(--rose);margin-bottom:26px}

  .echo-stage{display:flex;align-items:flex-end;justify-content:center;gap:clamp(2px,2vw,20px);flex-wrap:wrap}
  .cut{width:clamp(120px,26vw,200px);height:auto;filter:drop-shadow(0 14px 20px rgba(214,96,143,.4))}
  .cut-side{animation:bob 5s ease-in-out infinite .4s}
  .cut-front{animation:bob 4.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .polaroid{background:#fff;padding:14px;border-radius:10px;box-shadow:0 22px 46px -18px rgba(214,96,143,.6);transform:rotate(-4deg);position:relative;width:clamp(220px,52vw,340px);flex:0 0 auto}
  .polaroid img{display:block;width:100%;border-radius:5px}
  .polaroid .cap{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-family:'Caveat';font-size:clamp(22px,5vw,28px);color:var(--berry)}
  .polaroid::after{content:"";position:absolute;top:-14px;left:50%;transform:translateX(-50%) rotate(3deg);width:80px;height:26px;background:rgba(255,143,184,.5);border-radius:3px;box-shadow:0 2px 6px rgba(214,96,143,.3)}
  @media(max-width:560px){.cut{width:38vw}.polaroid{order:-1;width:74vw}}

  .reasons{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
  .reason{background:var(--cream);border:3px solid #fff;border-radius:22px;padding:22px 20px;box-shadow:0 12px 26px -16px rgba(214,96,143,.5);transition:transform .25s ease,box-shadow .25s ease}
  .reason:hover{transform:translateY(-6px) rotate(-1deg);box-shadow:0 20px 34px -16px rgba(214,96,143,.6)}
  .reason .pill{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:var(--bubblegum);font-size:20px;margin-bottom:10px}
  .reason p{margin:0;font-size:16.5px;font-weight:600}

  .letter-zone{text-align:center;padding:20px 0 30px;position:relative}
  .envelope{--w:min(360px,86vw);width:var(--w);height:calc(var(--w)*.66);margin:18px auto;position:relative;cursor:pointer;filter:drop-shadow(0 16px 26px rgba(214,96,143,.35))}
  .env-body{position:absolute;inset:0;background:linear-gradient(160deg,#FFD9E8,#FFC2DD);border-radius:16px;z-index:3}
  .env-pocket{position:absolute;inset:0;z-index:5;border-radius:16px;overflow:hidden}
  .env-pocket::before,.env-pocket::after{content:"";position:absolute;bottom:0;width:52%;height:100%;background:linear-gradient(160deg,#FFCFE1,#FFB6D3)}
  .env-pocket::before{left:0;transform:skewX(18deg);transform-origin:bottom left}
  .env-pocket::after{right:0;transform:skewX(-18deg);transform-origin:bottom right}
  .flap{position:absolute;top:0;left:0;width:100%;height:52%;background:linear-gradient(160deg,#FFB6D3,#FF9EC4);clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top;transition:transform .6s ease;z-index:8}
  .seal{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:var(--berry);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:9;box-shadow:0 4px 8px rgba(0,0,0,.15);transition:opacity .3s}
  .note{max-width:540px;margin:0 auto;background:var(--cream);border:3px solid #fff;border-radius:18px;box-shadow:0 18px 34px -16px rgba(214,96,143,.5);text-align:left;overflow:hidden;max-height:0;opacity:0;transform:translateY(-10px);padding:0 26px;transition:max-height .6s ease,opacity .5s ease,transform .5s ease,padding .6s ease,margin-top .5s ease}
  .note p{margin:0;font-family:'Caveat';font-size:clamp(20px,4.4vw,25px);color:var(--ink);line-height:1.45}
  .note .sign{display:block;margin-top:12px;font-family:'Fredoka';color:var(--rose);font-weight:600}
  .letter-zone.open .flap{transform:rotateX(180deg)}
  .letter-zone.open .seal{opacity:0}
  .letter-zone.open .note{max-height:900px;opacity:1;transform:none;padding:26px;margin-top:24px}
  .tap-hint{font-family:'Caveat';font-size:22px;color:var(--rose);transition:opacity .4s}
  .letter-zone.open .tap-hint{opacity:0}
  .echo-approve{position:absolute;right:1%;bottom:8px;width:clamp(84px,18vw,140px);animation:bob 4.2s ease-in-out infinite;filter:drop-shadow(0 10px 16px rgba(214,96,143,.4));pointer-events:none;z-index:2}
  @media(max-width:560px){.echo-approve{right:2%;bottom:-6px;opacity:.92}}

  footer{text-align:center;padding:30px 0 60px;color:var(--ink)}
  .foot-pups{display:flex;justify-content:center;align-items:flex-end;gap:6px;margin-bottom:6px}
  .foot-pups svg{width:76px;height:auto}
  footer .paws{font-size:18px;letter-spacing:8px;opacity:.5}
  footer .sig{font-family:'Caveat';font-size:26px;color:var(--berry);margin-top:6px}

  /* ── floating music player ── */
  .music-fab{position:fixed;left:16px;bottom:16px;z-index:9998;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:2px solid #fff;border-radius:999px;padding:8px 16px 8px 8px;box-shadow:0 12px 26px -12px rgba(214,96,143,.6);cursor:pointer;font-family:'Fredoka',sans-serif;color:var(--berry);transition:transform .2s ease;max-width:min(80vw,300px);user-select:none}
  .music-fab:hover{transform:translateY(-2px)}
  .music-fab:focus-visible{outline:3px solid var(--rose);outline-offset:2px}
  .music-fab .disc{width:38px;height:38px;flex:0 0 38px}
  .music-fab.playing .disc{animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .music-fab .mtext{display:flex;flex-direction:column;line-height:1.06;overflow:hidden;min-width:0}
  .music-fab .mtext b{font-size:14px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
  .music-fab .mtext small{font-size:11px;color:var(--ink);opacity:.7;font-family:'Nunito',sans-serif;font-weight:700;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
  .music-fab .micon{margin-left:2px;font-size:15px;color:var(--rose);flex:0 0 auto}
  .music-fab:not(.playing) .micon{animation:pulseIcon 1.6s ease-in-out infinite}
  @keyframes pulseIcon{0%,100%{opacity:1}50%{opacity:.3}}
  @media(max-width:430px){.music-fab .mtext b{max-width:110px}.music-fab .mtext small{max-width:110px}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;scroll-behavior:auto}}
</style>
</head>

  const els={days:document.querySelector('[data-c="days"]'),hours:document.querySelector('[data-c="hours"]'),mins:document.querySelector('[data-c="mins"]'),secs:document.querySelector('[data-c="secs"]')};

/* ── our song: Summertime Sadness (official YouTube embed, audio only) ── */
(function(){
  const VIDEO_ID="TdrL3QxjyVw"; // Lana Del Rey – Summertime Sadness (official). Swap this to change the song.
  const fab=document.getElementById('music'), icon=fab.querySelector('.micon');
  let player=null, ready=false, started=false, wantPlay=false;

  const tag=document.createElement('script'); tag.src="https://www.youtube.com/iframe_api";
  (document.head||document.body).appendChild(tag);

  window.onYouTubeIframeAPIReady=function(){
    try{
      player=new YT.Player('yt-audio',{videoId:VIDEO_ID,
        playerVars:{autoplay:0,controls:0,playsinline:1,rel:0},
        events:{
          onReady:function(){ready=true; if(wantPlay) play();},
          onStateChange:function(e){
            if(e.data===YT.PlayerState.PLAYING){fab.classList.add('playing');icon.textContent='❚❚';fab.setAttribute('aria-pressed','true');}
            else{fab.classList.remove('playing');icon.textContent='►';fab.setAttribute('aria-pressed','false');}
          }
        }});
    }catch(err){/* fall back to link */ fab.onclick=function(){window.open('https://www.youtube.com/watch?v='+VIDEO_ID,'_blank');};}
  };

  function play(){try{player.unMute();player.setVolume(70);player.playVideo();started=true;}catch(e){}}
  function pause(){try{player.pauseVideo();}catch(e){}}
  function toggle(){
    if(!ready){wantPlay=true;return;}
    const st=player.getPlayerState?player.getPlayerState():-1;
    if(st===YT.PlayerState.PLAYING) pause(); else play();
  }
  fab.addEventListener('click',toggle);
  fab.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}});

  // start on the first tap/click anywhere (browsers block silent autoplay)
  function firstGesture(){ if(started) return; if(ready) play(); else wantPlay=true; }
  window.addEventListener('pointerdown',firstGesture,{once:true});
  window.addEventListener('keydown',firstGesture,{once:true});
})();
</script>
